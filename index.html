<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan: Orchid & Khabibi</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FAF7F2; 
            --text-color: #2A2A2A; 
            --dark-bg: #1A1A1A; 
        }

        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-color); font-weight: 300; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; font-weight: 400; }

        /* --- Welcome Page --- */
        #welcome-page {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; text-align: center; transition: opacity 0.8s ease;
        }
        .welcome-names { font-size: 3.5rem; margin: 10px 0; }
        .btn-solid { background-color: var(--dark-bg); color: white; border: none; padding: 15px 35px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* --- Main Content --- */
        #main-content { display: none; }
        section { padding: 80px 20px; text-align: center; max-width: 600px; margin: 0 auto; }

        /* Hero */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 40%, rgba(0,0,0,0.8) 100%), #333;
            background-size: cover; background-position: center; padding-bottom: 10vh; color: white;
        }
        .hero h1 { font-size: 4rem; margin: 0; }

        /* Galeri */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 30px; }
        .gallery-item img { width: 100%; height: 250px; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .gallery-item:hover img { filter: grayscale(0%); }

        /* Form */
        .rsvp-form input, .rsvp-form select, .rsvp-form textarea { width: 100%; padding: 10px 0; background: transparent; border: none; border-bottom: 1px solid #ccc; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="welcome-page">
        <p>THE WEDDING OF</p>
        <h1 class="welcome-names serif">Orchid & Khabibi</h1>
        <button id="btn-buka" class="btn-solid">Buka Undangan</button>
    </div>

    <div id="main-content">
        <section class="hero">
            <h1 class="serif">Orchid<br>&<br>Khabibi</h1>
            <p>9 Agustus 2026</p>
        </section>

        <section>
            <h2 class="serif">Puncak Acara</h2>
            <p>18:30 - Akad Nikah</p>
            <p>20:00 - Resepsi</p>
            <p>Nyiur Melambai Restaurant, Manado</p>
        </section>

        <section>
            <h2 class="serif">Galeri</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=500&q=80" alt="Galeri"></div>
                <div class="gallery-item"><img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=500&q=80" alt="Galeri"></div>
            </div>
        </section>

        <section>
            <h2 class="serif">Buku Tamu</h2>
            <form class="rsvp-form">
                <input type="text" placeholder="Nama Anda">
                <select><option>Hadir</option><option>Tidak Hadir</option></select>
                <textarea placeholder="Pesan & Doa"></textarea>
                <button type="button" class="btn-solid">Kirim Pesan</button>
            </form>
        </section>
    </div>

    <script>
        document.getElementById('btn-buka').addEventListener('click', function() {
            document.getElementById('welcome-page').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-page').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }, 800);
        });
    </script>
</body>
</html>
